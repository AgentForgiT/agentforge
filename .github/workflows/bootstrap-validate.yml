name: Bootstrap Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required bootstrap files
        shell: bash
        run: |
          test -f README.md
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f ROADMAP.md
          test -f CHANGELOG.md
          test -f .agentforge/constitution.md
          test -f .agentforge/charter.md
          test -f .agentforge/decisions.md
          test -f .agentforge/adrs/0001-modular-monorepo.md
          test -f .agentforge/adrs/0002-gateway-module-placement.md
          test -f .agentforge/requirements/gateway-reconciliation.md
          test -f .agentforge/specs/aics-v0.1.md
          test -f .agentforge/specs/aics-validation-v0.1.md
          test -f .agentforge/agents/AGENTS.md
          test -f .agentforge/agents/CODEX.md
          test -f apps/gateway/README.md
          test -f apps/gateway/src/agentforge_gateway/app.py
          test -f apps/gateway/tests/test_app.py
      - name: Run bootstrap validator
        run: python scripts/validate_bootstrap.py
      - name: Run AICS validator
        run: python scripts/validate_aics.py
      - name: Run AICS example validator
        run: python scripts/validate_aics.py examples/aics/minimal-project
      - name: Run CLI tests
        run: python -m unittest discover -s apps/cli/tests
      - name: Run CLI install smoke tests
        run: python -m unittest apps.cli.tests.test_install
      - name: Run gateway tests
        run: python -m unittest discover -s apps/gateway/tests
